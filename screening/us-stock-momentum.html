<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>US Stock Momentum</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #ffffff; display: flex; flex-direction: column; height: 100vh; }
  #tab-bar { display: flex; background: #f0f3fa; border-bottom: 1px solid #d1d4dc; flex-shrink: 0; }
  .tab { background: none; border: none; color: #555f6d; font-size: 13px; font-weight: 600; padding: 10px 22px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab:hover { color: #131722; }
  .tab.active { color: #131722; border-bottom-color: #2962ff; }
  iframe { flex: 1; border: none; width: 100%; }
  body.dark { background: #131722; color: #d1d4dc; }
  body.dark #tab-bar { background: #1e222d; border-bottom-color: #2a2e39; }
  body.dark .tab { color: #787b86; }
  body.dark .tab:hover { color: #d1d4dc; }
  body.dark .tab.active { color: #d1d4dc; border-bottom-color: #5b9cf6; }
  #theme-btn { margin-left: auto; padding: 3px 10px; font-size: 11px; border: 1px solid #d1d4dc; border-radius: 4px; background: transparent; cursor: pointer; color: inherit; }
  body.dark #theme-btn { border-color: #434651; }
</style>
</head>
<body>
<div id="tab-bar">
    <button id="tab0" class="tab active" onclick="show(0)">Nasdaq-100</button>
<button id="theme-btn" onclick="toggleTheme()">Dark</button>
</div>
  <iframe id="fr0" src="us-stock-momentum-nasdaq-100.html" ></iframe>
<script>
function show(n) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i===n));
  document.querySelectorAll('iframe').forEach((f,i) => f.style.display = i===n ? '' : 'none');
}
function _applyTheme(dark){
  document.body.classList.toggle('dark',dark);
  var btn=document.getElementById('theme-btn');if(btn)btn.textContent=dark?'Light':'Dark';
}
function toggleTheme(){var dark=!document.body.classList.contains('dark');localStorage.theme=dark?'dark':'light';_applyTheme(dark);}
if(localStorage.theme==='dark')_applyTheme(true);
</script>
</body>
</html>
