const sidebar = document.getElementById('sidebar');
TICKERS.forEach((t, i) => {

function formatSummary(text) {
  return text.split('\n').map(function(line) {
    line = line.replace(/\x1b\[[0-9;]*m/g, '');
    const e = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (!e.trim()) return '';
    return e;
  }).join('\n');
}
function showSummary() {
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  const sb = document.getElementById('btn-summary'); if (sb) sb.classList.add('active');
  document.getElementById('info-bar').style.display = 'none';
  document.getElementById('chart').style.display = 'none';
  document.getElementById('summary-panel').style.display = 'block';
  document.getElementById('chart-label').textContent = 'Summary';
}

function nearestDate(dates, target) {
  if (dates.includes(target)) return target;
  const t = new Date(target).getTime();
  let best = null, bestDiff = Infinity;
  dates.forEach(function(dd) {
    const diff = Math.abs(new Date(dd).getTime() - t);
    if (diff < bestDiff && diff <= 4 * 86400000) { bestDiff = diff; best = dd; }
  });
  return best;
}

function showChart(ticker) {
  document.getElementById('info-bar').style.display = '';
  document.getElementById('chart').style.display = '';
  document.getElementById('summary-panel').style.display = 'none';
  document.querySelectorAll('.tbtn').forEach(b => b.classList.toggle('active', b.textContent === ticker));
  document.getElementById('chart-label').textContent = ticker;
  const m = (DATA[ticker] || {}).meta || {};
  const ibParts = [];
  if (m.name) ibParts.push('<span class="ib-name">' + m.name + '</span>');
  if (m.gap != null) {
    const cls = m.gap >= 0 ? 'ib-pos' : 'ib-neg';
    ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Gap </span><span class="' + cls + '">' + (m.gap >= 0 ? '+' : '') + m.gap.toFixed(2) + '%</span>');
  }
  if (m.rel_vol != null) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">RelVol </span><span class="ib-val">' + m.rel_vol.toFixed(1) + 'x</span>');
  if (m.signal) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Signal </span><span class="ib-val">' + m.signal + '</span>');
  if (m.rank != null) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Rank </span><span class="ib-val">' + m.rank + '</span>');
  if (m.beta != null) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Beta 3y </span><span class="ib-val">' + m.beta.toFixed(2) + '</span>');
  if (m.ath_gap != null) { const ac = m.ath_gap >= 0 ? 'ib-pos' : 'ib-neg'; ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">3M ATH </span><span class="' + ac + '">' + (m.ath_gap >= 0 ? '+' : '') + m.ath_gap.toFixed(1) + '%</span>'); }
  if (m.higher_low != null) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Higher Low </span><span class="ib-val">' + (m.higher_low_date ? m.higher_low_date + ' @ ' : '') + m.higher_low.toFixed(2) + '</span>');
  if (m.prior_breakouts) ibParts.push('<span class="ib-sep">|</span><span class="ib-val">' + m.prior_breakouts + ' prior signal' + (m.prior_breakouts > 1 ? 's' : '') + '</span>');
  if (m.earnings_days != null) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Earn </span><span class="ib-val">' + m.earnings_days + 'd</span>');
  if (m.sector) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Sector </span><span class="ib-val">' + m.sector + '</span>');
  if (m.notional != null) ibParts.push('<span class="ib-sep">|</span><span class="ib-lbl">Vol </span><span class="ib-val">$' + m.notional.toFixed(0) + 'M</span>');
  if (m.tags && m.tags.length) m.tags.forEach(function(tag) {
    ibParts.push('<span class="ib-badge' + (tag === 'E' ? ' ib-badge-e' : '') + '">' + tag + '</span>');
  });
  document.getElementById('info-bar').innerHTML = ibParts.join(' ');

  const d = DATA[ticker];
  const volColors = d.close.map((c, i) =>
    (c != null && d.open[i] != null && c >= d.open[i]) ? 'rgba(38,166,154,0.5)' : 'rgba(239,83,80,0.5)');

  const traces = [
    {
      type: 'candlestick',
      x: d.dates, open: d.open, high: d.high, low: d.low, close: d.close,
      increasing: { line: { color: '#26a69a' }, fillcolor: '#26a69a' },
      decreasing: { line: { color: '#ef5350' }, fillcolor: '#ef5350' },
      name: ticker, xaxis: 'x', yaxis: 'y', showlegend: false,
    },
    { type:'scatter', x:d.dates, y:d.ema9,   mode:'lines', line:{color:'#000000',width:1.2}, name:'EMA 9',   xaxis:'x', yaxis:'y' },
    { type:'scatter', x:d.dates, y:d.ema20,  mode:'lines', line:{color:'#2196f3',width:1.3}, name:'EMA 20',  xaxis:'x', yaxis:'y' },
    { type:'scatter', x:d.dates, y:d.ema50,  mode:'lines', line:{color:'#43a047',width:1.5}, name:'EMA 50',  xaxis:'x', yaxis:'y' },
    { type:'scatter', x:d.dates, y:d.ema200, mode:'lines', line:{color:'#e53935',width:1.8}, name:'EMA 200', xaxis:'x', yaxis:'y' },
    {
      type: 'bar', x: d.dates, y: d.volume,
      marker: { color: volColors },
      name: 'Volume', xaxis: 'x', yaxis: 'y2', showlegend: false,
    },
  ];

  const bm = d.meta || {};
  const shapes = [];
  const annotations = [];

  // ── Today separator + future shading (TradingView style) ──────────
  const nFuture = d.n_future || 0;

    const lastReal = d.dates[d.dates.length - nFuture - 1];
    const firstFut = d.dates[d.dates.length - nFuture];

    shapes.push({
      type: 'line', x0: lastReal, x1: lastReal, y0: 0.28, y1: 1,
      xref: 'x', yref: 'paper',

    shapes.push({
      type: 'line', x0: d.dates[0], x1: d.dates[d.dates.length - 1],
      y0: bm.higher_low, y1: bm.higher_low,
      xref: 'x', yref: 'y',
      line: { color: '#2196f3', width: 1 },
    });
  }

  // Plotly's x-axis is categorical (the explicit list of trading-day date

  // of those categories gets appended at the end of the axis instead of
  // placed chronologically — so points older than the chart's visible

      name: 'Trend', xaxis: 'x', yaxis: 'y', showlegend: false,
    });
  }

  // ── Earnings markers (TradingView style) ─────────────────────────
  // Badge at bottom edge of price pane, no vertical line (like TradingView)
  const todayStr = new Date().toISOString().split('T')[0];
  (d.earnings || []).forEach(function(eDate) {

    if (!xDate) return;
    const isFuture = eDate > todayStr;
    const color = isFuture ? '#ff9800' : '#f9a825';
    annotations.push({
      x: xDate, y: 0, xref: 'x', yref: 'paper',
      text: '<b>E</b>', showarrow: false,
      font: { color: '#ffffff', size: 9, family: 'sans-serif' },
      bgcolor: color, bordercolor: color, borderwidth: 0, borderpad: 2,
      xanchor: 'center', yanchor: 'bottom',
    });
  });

  // ── Meta label box left of last candle (Gap, RelVol, tags) ─────────
  const nf3 = d.n_future || 0;

    const anchorX = d.dates[labelIdx];
    const lastClose = d.close[lastIdx];

      if (bm.prior_breakouts) lineParts.push(bm.prior_breakouts + ' prior');
      if (bm.signal) lineParts.push(bm.signal);
      if (bm.tags && bm.tags.length) lineParts.push(bm.tags.join(' '));
      if (lineParts.length) {
        const gColor = (bm.gap != null) ? (bm.gap >= 0 ? '#26a69a' : '#ef5350') : (bm.ath_gap != null ? (bm.ath_gap >= 0 ? '#26a69a' : '#ef5350') : '#2962ff');
        annotations.push({
          x: anchorX, y: lastClose, xref: 'x', yref: 'y',
          text: lineParts.join('  '),
          showarrow: true, arrowhead: 0, arrowcolor: 'rgba(150,150,150,0.5)', arrowwidth: 1,
          ax: 0, ay: -36,
          font: { color: gColor, size: 11, family: 'sans-serif' },
          xanchor: 'center', yanchor: 'bottom',
          bgcolor: 'rgba(255,255,255,0.9)', bordercolor: gColor, borderwidth: 1, borderpad: 4,
        });
      }
    }
  }

  // ── Month tick labels for x-axis (TradingView style) ────────────
  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthTicks = { vals: [], text: [] };
  let lastMonth = -1;
  d.dates.forEach(function(dd) {

    paper_bgcolor: '#ffffff', plot_bgcolor: '#ffffff',
    font: { color: '#131722', size: 11 },
    margin: { l: 8, r: 70, t: 10, b: 30 },
    shapes: shapes,
