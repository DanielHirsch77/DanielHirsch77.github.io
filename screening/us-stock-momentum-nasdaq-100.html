function nearestDate(dates, target) {
  if (dates.includes(target)) return target;
  const t = new Date(target).getTime();
  let best = null, bestDiff = Infinity;
  dates.forEach(function(dd) {
    const diff = Math.abs(new Date(dd).getTime() - t);
    if (diff < bestDiff && diff <= 4 * 86400000) { bestDiff = diff; best = dd; }
  });
  return best;
}

  }

  // ── Swing points exactly as detected by trend.py, joined by the ──
  // confirmed-trend line (blue) connecting them chronologically ─────
  // Plotly's x-axis is categorical (the explicit list of trading-day date
  // strings, incl. blank future bars). A swing point whose date isn't one
  // of those categories gets appended at the end of the axis instead of
  // placed chronologically — so points older than the chart's visible
  // window must be dropped here, or they'd render in the future zone.
  const dateSet = new Set(d.dates);
  const visibleSwings = (bm.swing_points || []).filter(function(p) { return dateSet.has(p.date); });
  if (visibleSwings.length) {
    traces.push({
      type: 'scatter',
      x: visibleSwings.map(function(p) { return p.date; }),
      y: visibleSwings.map(function(p) { return p.value; }),
      mode: 'lines',
      line: { color: '#1565c0', width: 2 },
      name: 'Trend', xaxis: 'x', yaxis: 'y', showlegend: false,
    });
  }

  // ── Earnings markers (TradingView style) ─────────────────────────
  // Badge at bottom edge of price pane, no vertical line (like TradingView)
  const todayStr = new Date().toISOString().split('T')[0];
  (d.earnings || []).forEach(function(eDate) {
    const xDate = nearestDate(d.dates, eDate);
    if (!xDate) return;
    const isFuture = eDate > todayStr;
    const color = isFuture ? '#ff9800' : '#f9a825';
    annotations.push({
      x: xDate, y: 0, xref: 'x', yref: 'paper',
      text: '<b>E</b>', showarrow: false,
      font: { color: '#ffffff', size: 9, family: 'sans-serif' },
      bgcolor: color, bordercolor: color, borderwidth: 0, borderpad: 2,
      xanchor: 'center', yanchor: 'bottom',
    });
  });

  // ── Meta label box left of last candle (Gap, RelVol, tags) ─────────
  const nf3 = d.n_future || 0;
  if (nf3 > 0 && d.dates.length > nf3) {
    const lastIdx = d.dates.length - nf3 - 1;
    const labelIdx = Math.max(0, lastIdx - 10);
    const anchorX = d.dates[labelIdx];
    const lastClose = d.close[lastIdx];
    if (lastClose != null) {
      const lineParts = [];
      if (bm.gap != null) {
        const gSign = bm.gap >= 0 ? '+' : '';
        lineParts.push('<b>' + gSign + bm.gap.toFixed(2) + '%</b>');
      }
      if (bm.rel_vol != null) lineParts.push('RelVol ' + bm.rel_vol.toFixed(1) + 'x');
      if (bm.rank != null) lineParts.push('Rank ' + bm.rank);
      if (bm.beta != null) lineParts.push('β ' + bm.beta.toFixed(2));
      if (bm.ath_gap != null) { const ags = bm.ath_gap >= 0 ? '+' : ''; lineParts.push('ATH ' + ags + bm.ath_gap.toFixed(1) + '%'); }
      if (bm.higher_low != null) lineParts.push('HL ' + bm.higher_low.toFixed(2));
      if (bm.prior_breakouts) lineParts.push(bm.prior_breakouts + ' prior');
      if (bm.signal) lineParts.push(bm.signal);
      if (bm.tags && bm.tags.length) lineParts.push(bm.tags.join(' '));
      if (lineParts.length) {
        const gColor = (bm.gap != null) ? (bm.gap >= 0 ? '#26a69a' : '#ef5350') : (bm.ath_gap != null ? (bm.ath_gap >= 0 ? '#26a69a' : '#ef5350') : '#2962ff');
        annotations.push({
          x: anchorX, y: lastClose, xref: 'x', yref: 'y',
          text: lineParts.join('  '),
          showarrow: true, arrowhead: 0, arrowcolor: 'rgba(150,150,150,0.5)', arrowwidth: 1,
          ax: 0, ay: -36,
          font: { color: gColor, size: 11, family: 'sans-serif' },
          xanchor: 'center', yanchor: 'bottom',
          bgcolor: 'rgba(255,255,255,0.9)', bordercolor: gColor, borderwidth: 1, borderpad: 4,
        });
      }
    }
  }

  // ── Month tick labels for x-axis (TradingView style) ────────────
  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthTicks = { vals: [], text: [] };
  let lastMonth = -1;
  d.dates.forEach(function(dd) {
    const m = new Date(dd).getUTCMonth();
    if (m !== lastMonth) { monthTicks.vals.push(dd); monthTicks.text.push(MONTH_SHORT[m]); lastMonth = m; }
  });

  const layout = {
    paper_bgcolor: '#ffffff', plot_bgcolor: '#ffffff',
    font: { color: '#131722', size: 11 },
    margin: { l: 8, r: 70, t: 10, b: 30 },
    shapes: shapes,
    annotations: annotations,
    xaxis: {
      rangeslider: { visible: false },
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      type: 'category', tickangle: 0,
      tickvals: monthTicks.vals, ticktext: monthTicks.text,
    },
    yaxis: {
      domain: [0.28, 1],
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      side: 'right', automargin: false,
      showline: false, mirror: false, zeroline: false,
    },
    yaxis2: {
      domain: [0, 0.24],
      showgrid: false, side: 'right', automargin: false,
      showline: false, mirror: false, zeroline: false,
    },
    legend: {
      x: 0.01, y: 0.99, bgcolor: 'rgba(255,255,255,0.8)',
      bordercolor: '#d1d4dc', borderwidth: 1,
      font: { size: 11 },
    },
    showlegend: true,
    bargap: 0.1,
  };

  Plotly.react('chart', traces, layout, { responsive: true, displayModeBar: false });
}

if (TICKERS.length > 0) showChart(TICKERS[0]);
</script>
<script>
const _DL={paper_bgcolor:'#131722',plot_bgcolor:'#131722','font.color':'#d1d4dc','xaxis.gridcolor':'#1e222d','yaxis.gridcolor':'#1e222d','legend.bgcolor':'rgba(30,34,45,0.9)','legend.bordercolor':'#2a2e39'};
const _LL={paper_bgcolor:'#ffffff',plot_bgcolor:'#ffffff','font.color':'#131722','xaxis.gridcolor':'#e0e3eb','yaxis.gridcolor':'#e0e3eb','legend.bgcolor':'rgba(255,255,255,0.8)','legend.bordercolor':'#d1d4dc'};
function _applyTheme(dark){
  document.body.classList.toggle('dark',dark);
  var btn=document.getElementById('theme-btn');if(btn)btn.textContent=dark?'Light':'Dark';
  var el=document.getElementById('chart');if(el&&el.data)Plotly.relayout('chart',dark?_DL:_LL);
}
function toggleTheme(){var dark=!document.body.classList.contains('dark');localStorage.theme=dark?'dark':'light';_applyTheme(dark);}
requestAnimationFrame(function(){if(localStorage.theme==='dark')_applyTheme(true);});
</script>
</body>
