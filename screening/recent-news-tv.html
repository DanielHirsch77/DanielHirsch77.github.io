    { type:'bar', x:d1.x, y:d1.volume, marker:{color:d1VolColors}, name:'Vol', xaxis:'x', yaxis:'y2', showlegend:false },
  ];
  const d1Layout = {
    paper_bgcolor:'#ffffff', plot_bgcolor:'#ffffff', margin:{l:8,r:58,t:24,b:34}, font:{color:'#131722',size:11},
    xaxis:{type:'category',showgrid:true,gridcolor:'#e0e3eb',rangeslider:{visible:false},tickmode:'array',tickvals:d1GapTickVals,ticktext:d1GapTickText,anchor:'y2',side:'bottom'},
    yaxis:{domain:[0.3,1],side:'right',showgrid:true,gridcolor:'#e0e3eb',zeroline:false},
    yaxis2:{domain:[0,0.25],side:'right',showgrid:false,zeroline:false},
    shapes:d1Shapes,
    annotations:d1Annotations,
    legend:{orientation:'h',x:1,xanchor:'right',y:1.02,yanchor:'bottom',bgcolor:'rgba(255,255,255,0.8)',bordercolor:'#d1d4dc',borderwidth:1,font:{size:10}},
    bargap:0.1, showlegend:true
  };
  const h1Shapes = buildExtendedSessionShapes(h1.x);
  const h1Annotations = [];
{
  // Macro events (CPI/PPI/NFP/FOMC/PCE/GDP) -- pre-snapped in Python
  // (Chart_Analysis/HTML/macro-overlay.py:snap_events_to_bars). One arrow per
  // event at that bar's high, label = event type only, no frame. Shared style.
  (h1.macro_marks || []).forEach(m => {
    h1Annotations.push({x:(h1.x)[m.index], y:(h1.high)[m.index],
      xref:'x', yref:'y', text:'<b>'+m.type+'</b>', showarrow:true, arrowhead:2,
      arrowcolor:'#3498db', arrowsize:0.8, arrowwidth:1.5,
      ax:0, ay:-60, standoff:14,
      font:{color:'#3498db', size:10}});
  });
}  if (m.gap_low != null && m.gap_high != null) {
    const isUpGap = (m.gap != null ? m.gap >= 0 : (m.gap_open != null && m.prev_close != null ? m.gap_open >= m.prev_close : true));
    h1Shapes.push({
      type:'rect', xref:'paper', yref:'y', x0:0, x1:1,
      y0:m.gap_low, y1:m.gap_high,
      line:{width:0}, layer:'below',
      fillcolor: isUpGap ? 'rgba(38,166,154,0.09)' : 'rgba(239,83,80,0.09)'
    });
  }
  if (m.gap_close_25 != null) {
    h1Shapes.push({
      type:'line', xref:'paper', yref:'y', x0:0, x1:1, y0:m.gap_close_25, y1:m.gap_close_25,
      line:{color:'rgba(103,110,131,0.55)', width:1, dash:'dot'}, layer:'below'
    });
    h1Annotations.push({
      xref:'paper', yref:'y', x:0.004, y:m.gap_close_25,
      text:'25%', showarrow:false,
      xanchor:'left', yanchor:'bottom',
      font:{size:10,color:'rgba(90,96,114,0.95)'},
      bgcolor:'rgba(255,255,255,0.65)', bordercolor:'rgba(0,0,0,0)'
    });
  }
  if (m.gap_open != null) {
    h1Annotations.push({
      xref:'paper', yref:'y', x:0.004, y:m.gap_open,
      text:'0%', showarrow:false,
      xanchor:'left', yanchor:'bottom',
      font:{size:10,color:'rgba(90,96,114,0.95)'},
      bgcolor:'rgba(255,255,255,0.65)', bordercolor:'rgba(0,0,0,0)'
    });
  }
  const h1Traces = [
    { type:'candlestick', x:h1.x, open:h1.open, high:h1.high, low:h1.low, close:h1.close, increasing:{line:{color:'#26a69a'}}, decreasing:{line:{color:'#ef5350'}}, name:'H1', xaxis:'x', yaxis:'y', showlegend:false },
    { type:'scatter', x:h1.x, y:h1.ema20, mode:'lines', line:{color:'#2196f3',width:1.1}, name:'EMA20' },
    { type:'scatter', x:h1.x, y:h1.ema50, mode:'lines', line:{color:'#43a047',width:1.2}, name:'EMA50' },
    { type:'bar', x:h1.x, y:h1.volume, marker:{color:h1VolColors}, name:'Vol', xaxis:'x', yaxis:'y2', showlegend:false },
  ];
  const h1Layout = {
    paper_bgcolor:'#ffffff', plot_bgcolor:'#ffffff', margin:{l:8,r:58,t:24,b:44}, font:{color:'#131722',size:11},
    xaxis:{type:'category',showgrid:true,gridcolor:'#e0e3eb',tickmode:'array',tickvals:h1Ticks.vals,ticktext:h1Ticks.text,rangeslider:{visible:false},anchor:'y2',side:'bottom'},
    yaxis:{domain:[0.3,1],side:'right',showgrid:true,gridcolor:'#e0e3eb',zeroline:false},
    yaxis2:{domain:[0,0.25],side:'right',showgrid:false,zeroline:false},
    shapes:h1Shapes,
    annotations:h1Annotations,
    legend:{orientation:'h',x:1,xanchor:'right',y:1.02,yanchor:'bottom',bgcolor:'rgba(255,255,255,0.8)',bordercolor:'#d1d4dc',borderwidth:1,font:{size:10}},
    bargap:0.1, showlegend:true
  };
  Plotly.react('chart-d1', d1Traces, d1Layout, { responsive:true, displayModeBar:false });
  Plotly.react('chart-h1', h1Traces, h1Layout, { responsive:true, displayModeBar:false });
}
if (TICKERS.length > 0) showCharts(TICKERS[0]);
</script>
<script>
const _DL={paper_bgcolor:'#131722',plot_bgcolor:'#131722','font.color':'#d1d4dc','xaxis.gridcolor':'#1e222d','yaxis.gridcolor':'#1e222d'};
const _LL={paper_bgcolor:'#ffffff',plot_bgcolor:'#ffffff','font.color':'#131722','xaxis.gridcolor':'#e0e3eb','yaxis.gridcolor':'#e0e3eb'};
function _applyTheme(dark){
  document.body.classList.toggle('dark',dark);
  var btn=document.getElementById('theme-btn');if(btn)btn.textContent=dark?'Light':'Dark';
  ['chart-d1','chart-h1'].forEach(function(id){var el=document.getElementById(id);if(el&&el.data)Plotly.relayout(id,dark?_DL:_LL);});
}
function toggleTheme(){var dark=!document.body.classList.contains('dark');localStorage.theme=dark?'dark':'light';_applyTheme(dark);}
requestAnimationFrame(function(){if(localStorage.theme==='dark')_applyTheme(true);});
</script>
</body>
