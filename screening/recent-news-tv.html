function formatSummary(text) {

    line = line.replace(/\x1b\[[0-9;]*m/g, '');
    const e = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (!e.trim()) return '';
    return e;
  }).join('\n');
}

function buildH1TradingViewTicks(xs, opens) {
  const vals = [];
  const text = [];
  const monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let prevDate = '';
  let firstDaySkipped = false;
  xs.forEach(function(x, i) {
    if (opens && opens[i] == null) return;
    const d = x.slice(0, 10);
    if (d !== prevDate) {
      prevDate = d;
      if (!firstDaySkipped) {
        firstDaySkipped = true;
        return;
      }
      const mm = parseInt(d.slice(5, 7), 10);
      const dd = parseInt(d.slice(8, 10), 10);
      if (Number.isFinite(mm) && Number.isFinite(dd) && mm >= 1 && mm <= 12) {
        vals.push(x);
        text.push(String(dd) + ' ' + monthShort[mm - 1]);
      }
    }
  });
  return { vals: vals, text: text };
}
function buildExtendedSessionShapes(xs) {
  const PRE_COLOR = 'rgba(255, 220, 90, 0.16)';
  const POST_COLOR = 'rgba(129, 170, 255, 0.22)';
  const shapes = [];
  let runStart = null;
  let runType = null;
  function extType(hm) {
    // User-defined visual windows for H1 shading:
    // yellow: 10:00-16:00, blue: 22:00-02:00.
    if (hm >= 1000 && hm < 1600) return 'pre';
    if (hm >= 2200 || hm < 200) return 'post';
    return 'regular';
  }
  function pushRun(endX) {
    if (runStart === null || runType === null || !endX) return;
    const color = runType === 'pre' ? PRE_COLOR : POST_COLOR;
    shapes.push({
      type:'rect', xref:'x', yref:'paper',
      x0:runStart, x1:endX, y0:0, y1:1,
      line:{width:0}, layer:'below', fillcolor:color
    });
  }
  xs.forEach(function(x, idx) {
    const hm = parseInt(x.slice(11, 13) + x.slice(14, 16), 10);
    const t = extType(hm);
    if (runType !== null && t !== runType) {
      // Close current block exactly at boundary candle to avoid visual gaps.
      pushRun(x);
      runStart = null;
      runType = null;
    }
    if (runType === null && t !== 'regular') {
      runStart = x;
      runType = t;
    }
    if (idx === xs.length - 1 && runType !== null) {
      pushRun(x);
      runStart = null;
      runType = null;
    }
  });
  return shapes;
}
