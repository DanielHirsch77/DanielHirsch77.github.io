  const h1Layout = {
    paper_bgcolor:'#ffffff', plot_bgcolor:'#ffffff', margin:{l:8,r:58,t:8,b:44}, font:{color:'#131722',size:11},
    xaxis:{type:'category',showgrid:true,gridcolor:'#e0e3eb',tickmode:'array',tickvals:h1Ticks.vals,ticktext:h1Ticks.text,rangeslider:{visible:false},anchor:'y2',side:'bottom'},
    yaxis:{domain:[0.3,1],side:'right',showgrid:true,gridcolor:'#e0e3eb',zeroline:false},
    yaxis2:{domain:[0,0.25],side:'right',showgrid:false,zeroline:false},
    shapes:h1Shapes,
    annotations:h1Annotations,
    legend:{x:0.01,y:0.99,bgcolor:'rgba(255,255,255,0.8)',bordercolor:'#d1d4dc',borderwidth:1,font:{size:10}},
    bargap:0.1, showlegend:true
  };
  Plotly.react('chart-d1', d1Traces, d1Layout, { responsive:true, displayModeBar:false });
  Plotly.react('chart-h1', h1Traces, h1Layout, { responsive:true, displayModeBar:false });
}
if (TICKERS.length > 0) showCharts(TICKERS[0]);
</script>
