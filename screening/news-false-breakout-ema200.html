<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Screening</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #ffffff; display: flex; flex-direction: column; height: 100vh; }
  #tab-bar { display: flex; background: #f0f3fa; border-bottom: 1px solid #d1d4dc; flex-shrink: 0; }
  .tab { background: none; border: none; color: #555f6d; font-size: 13px; font-weight: 600;
          padding: 10px 22px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab:hover { color: #131722; }
  .tab.active { color: #131722; border-bottom-color: #2962ff; }
  iframe { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>
<div id="tab-bar">
    <button id="tab0" class="tab active" onclick="show(0)">News</button>
    <button id="tab1" class="tab" onclick="show(1)">Recent News</button>
    <button id="tab2" class="tab" onclick="show(2)">False Breakout</button>
    <button id="tab3" class="tab" onclick="show(3)">EMA200 Bounce</button>
</div>
  <iframe id="fr0" src="news-tv.html" ></iframe>
  <iframe id="fr1" src="recent-news-tv.html" style="display:none" ></iframe>
  <iframe id="fr2" src="false-breakout-long.html" style="display:none" ></iframe>
  <iframe id="fr3" src="ema200-long-bounce.html" style="display:none" ></iframe>
<script>
function show(n) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', i===n));
  document.querySelectorAll('iframe').forEach((f,i) => f.style.display = i===n ? '' : 'none');
}
</script>
</body>
</html>
