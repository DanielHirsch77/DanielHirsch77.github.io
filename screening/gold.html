// Generate phantom "future" category labels (no candles yet) so SMC labels
// can be drawn to the right of the data without covering candles.
function genFutureDates(dates, n) {
  if (dates.length < 2) return [];
  const hasTime = dates[0].length > 10;
  const parse = s => hasTime
    ? new Date(s.replace(' ', 'T') + ':00Z')
    : new Date(s + 'T00:00:00Z');
  const pad = v => String(v).padStart(2, '0');
  const fmt = dt => {
    const y = dt.getUTCFullYear(), mo = pad(dt.getUTCMonth() + 1), da = pad(dt.getUTCDate());
    if (!hasTime) return `${y}-${mo}-${da}`;
    return `${y}-${mo}-${da} ${pad(dt.getUTCHours())}:${pad(dt.getUTCMinutes())}`;
  };
  const last = parse(dates[dates.length - 1]);
  const prev = parse(dates[dates.length - 2]);
  const step = last.getTime() - prev.getTime();
  if (!(step > 0)) return [];
  const out = [];
  for (let i = 1; i <= n; i++) out.push(fmt(new Date(last.getTime() + step * i)));
  return out;
}

      type: 'candlestick',
      x: d.dates, open: d.open, high: d.high, low: d.low, close: d.close,
      increasing: { line: { color: '#26a69a' }, fillcolor: '#26a69a' },
      decreasing: { line: { color: '#ef5350' }, fillcolor: '#ef5350' },
      name: 'Gold', xaxis: 'x', yaxis: 'y', showlegend: false,
    },
    { type:'scatter', x:d.dates, y:d.ema9,   mode:'lines',
       line:{color:'#000000',width:1.2}, name:'EMA 9',   xaxis:'x', yaxis:'y' },
    { type:'scatter', x:d.dates, y:d.ema20,  mode:'lines',
       line:{color:'#2196f3',width:1.3}, name:'EMA 20',  xaxis:'x', yaxis:'y' },
    { type:'scatter', x:d.dates, y:d.ema50,  mode:'lines',
       line:{color:'#43a047',width:1.5}, name:'EMA 50',  xaxis:'x', yaxis:'y' },
    { type:'scatter', x:d.dates, y:d.ema200, mode:'lines',
       line:{color:'#e53935',width:1.8}, name:'EMA 200', xaxis:'x', yaxis:'y' },
    {
      type:'bar', x:d.dates, y:d.volume,
      marker:{color:volColors},
      name:'Volume', xaxis:'x', yaxis:'y2', showlegend:false,
    },
    {
      type:'scatter', x:d.dates, y:d.rsi14, mode:'lines',
      line:{color:'#7e57c2', width:1.3},
      name:'RSI 14', xaxis:'x', yaxis:'y3', showlegend:false,
      hovertemplate:'RSI %{y:.1f}<extra></extra>',
    },
    {
      type:'scatter', x:d.dates, y:d.rsi14_ma, mode:'lines',
      line:{color:'#fbc02d', width:1.3},
      name:'RSI MA 14', xaxis:'x', yaxis:'y3', showlegend:false,
      hovertemplate:'RSI MA %{y:.1f}<extra></extra>',
    },
  ];

  const rsiShapes = [
    { type:'line', xref:'paper', x0:0, x1:1, yref:'y3', y0:70, y1:70,
       line:{color:'rgba(239,83,80,0.5)', width:1, dash:'dot'} },
    { type:'line', xref:'paper', x0:0, x1:1, yref:'y3', y0:30, y1:30,
       line:{color:'rgba(38,166,154,0.5)', width:1, dash:'dot'} },
  ];

  const rsiAnnotations = [
    { x:0.005, y:1, xref:'x domain', yref:'y3 domain', xanchor:'left', yanchor:'top',
       text:'<span style="color:#7e57c2">RSI 14 close</span> · <span style="color:#fbc02d">MA 14</span>',
       showarrow:false, font:{size:10}, bgcolor:'rgba(255,255,255,0.7)' },
    { x:1.0, y:70, xref:'x domain', yref:'y3', xanchor:'right', yanchor:'bottom',
       text:'70', showarrow:false, font:{size:9, color:'rgba(239,83,80,0.8)'} },
    { x:1.0, y:30, xref:'x domain', yref:'y3', xanchor:'right', yanchor:'top',
       text:'30', showarrow:false, font:{size:9, color:'rgba(38,166,154,0.8)'} },
  ];

  const s = d.smc || {};
  if ((s.swing_highs || []).length > 0) {
    traces.push({
      type:'scatter', x:s.swing_highs.map(h=>h.date),
      y:s.swing_highs.map(h=>h.level * 1.0006),
      mode:'markers',
      marker:{symbol:'triangle-down', color:'#ef5350', size:7, opacity:0.9},
      name:'Swing High', xaxis:'x', yaxis:'y', showlegend:false,
      hovertemplate:'SH %{y:.2f}<extra></extra>',
    });
  }
  if ((s.swing_lows || []).length > 0) {
    traces.push({
      type:'scatter', x:s.swing_lows.map(l=>l.date),
      y:s.swing_lows.map(l=>l.level * 0.9994),
      mode:'markers',
      marker:{symbol:'triangle-up', color:'#26a69a', size:7, opacity:0.9},
      name:'Swing Low', xaxis:'x', yaxis:'y', showlegend:false,
      hovertemplate:'SL %{y:.2f}<extra></extra>',
    });
  }

  const shapes = [...rsiShapes];
  const annotations = [...rsiAnnotations];

  (s.bull_obs || []).forEach(ob => {
    shapes.push({
      type:'rect', x0:ob.x0, x1:ob.x1, y0:ob.bottom, y1:ob.top,
      xref:'x', yref:'y',
      fillcolor:'rgba(38,166,154,0.14)',
      line:{color:'rgba(38,166,154,0.55)', width:1},
    });
    annotations.push({
      x:labelX, y:(ob.bottom+ob.top)/2, xref:'x', yref:'y',
      text:'Bull OB', showarrow:false,
      font:{color:'#26a69a', size:9},
      xanchor:'left', yanchor:'middle', bgcolor:'rgba(255,255,255,0.7)',
    });
  });

  (s.bear_obs || []).forEach(ob => {
    shapes.push({
      type:'rect', x0:ob.x0, x1:ob.x1, y0:ob.bottom, y1:ob.top,
      xref:'x', yref:'y',
      fillcolor:'rgba(239,83,80,0.14)',
      line:{color:'rgba(239,83,80,0.55)', width:1},
    });
    annotations.push({
      x:labelX, y:(ob.bottom+ob.top)/2, xref:'x', yref:'y',
      text:'Bear OB', showarrow:false,
      font:{color:'#ef5350', size:9},
      xanchor:'left', yanchor:'middle', bgcolor:'rgba(255,255,255,0.7)',
    });
  });

  (s.bull_fvgs || []).forEach(fvg => {
    shapes.push({
      type:'rect', x0:fvg.x0, x1:fvg.x1, y0:fvg.bottom, y1:fvg.top,
      xref:'x', yref:'y',
      fillcolor:'rgba(0,188,212,0.10)',
      line:{color:'rgba(0,188,212,0.45)', width:1, dash:'dot'},
    });
  });

  (s.bear_fvgs || []).forEach(fvg => {
    shapes.push({
      type:'rect', x0:fvg.x0, x1:fvg.x1, y0:fvg.bottom, y1:fvg.top,
      xref:'x', yref:'y',
      fillcolor:'rgba(255,152,0,0.10)',
      line:{color:'rgba(255,152,0,0.45)', width:1, dash:'dot'},
    });
  });

  (s.bos || []).slice(-5).forEach(b => {
    const col = b.dir === 1 ? '#26a69a' : '#ef5350';
    shapes.push({
      type:'line', x0:b.date, x1:lastDate, y0:b.level, y1:b.level,
      xref:'x', yref:'y',
      line:{color:col, width:1.5, dash:'dash'},
    });
    annotations.push({
      x:labelX, y:b.level, xref:'x', yref:'y',
      text:(b.dir===1?'BOS ↑':'BOS ↓') + ' ' + b.level.toFixed(0),
      showarrow:false, font:{color:col, size:9},
      xanchor:'left', yanchor:'bottom', bgcolor:'rgba(19,23,34,0.7)',
    });
  });

  (s.choch || []).slice(-5).forEach(c => {
    const col = c.dir === 1 ? '#80cbc4' : '#ef9a9a';
    shapes.push({
      type:'line', x0:c.date, x1:lastDate, y0:c.level, y1:c.level,
      xref:'x', yref:'y',
      line:{color:col, width:1, dash:'dot'},
    });
    annotations.push({
      x:labelX, y:c.level, xref:'x', yref:'y',
      text:(c.dir===1?'CHoCH ↑':'CHoCH ↓') + ' ' + c.level.toFixed(0),
      showarrow:false, font:{color:col, size:9},
      xanchor:'left', yanchor:'top', bgcolor:'rgba(19,23,34,0.7)',
    });
  });

  (s.buy_liq || []).filter(l=>l.open).slice(-3).forEach(l => {
    shapes.push({
      type:'line', x0:d.dates[0], x1:lastDate, y0:l.level, y1:l.level,
      xref:'x', yref:'y',
      line:{color:'rgba(38,166,154,0.55)', width:1, dash:'dashdot'},
    });
    annotations.push({
      x:labelX, y:l.level, xref:'x', yref:'y',
      text:'BSL ' + l.level.toFixed(0), showarrow:false,
      font:{color:'rgba(38,166,154,0.8)', size:9},
      xanchor:'left', yanchor:'top', bgcolor:'rgba(19,23,34,0.7)',
    });
  });

  (s.sell_liq || []).filter(l=>l.open).slice(-3).forEach(l => {
    shapes.push({
      type:'line', x0:d.dates[0], x1:lastDate, y0:l.level, y1:l.level,
      xref:'x', yref:'y',
      line:{color:'rgba(239,83,80,0.55)', width:1, dash:'dashdot'},
    });
    annotations.push({
      x:labelX, y:l.level, xref:'x', yref:'y',
      text:'SSL ' + l.level.toFixed(0), showarrow:false,
      font:{color:'rgba(239,83,80,0.8)', size:9},
      xanchor:'left', yanchor:'bottom', bgcolor:'rgba(19,23,34,0.7)',
    });
  });

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const tickVals = [], tickText = [];
  if (isIntraday) {
    const seenDays = new Set();
    d.dates.forEach(dt => {
      const day = dt.substring(0, 10);
      if (!seenDays.has(day)) {
        seenDays.add(day);
        const p = day.split('-');
        tickVals.push(dt); tickText.push(p[2] + '.' + p[1] + '.');
      }
    });
  } else {
    const seenMonths = new Set();
    d.dates.forEach(dt => {
      const key = dt.substring(0, 7);
      if (!seenMonths.has(key)) {
        seenMonths.add(key);
        const m = parseInt(dt.substring(5, 7)) - 1;
        tickVals.push(dt); tickText.push(MONTHS[m]);
      }
    });
  }

  const layout = {
    paper_bgcolor: '#ffffff', plot_bgcolor: '#ffffff',
    font: { color: '#131722', size: 11 },
    margin: { l: 8, r: 80, t: 8, b: 28 },
    shapes: shapes,
    annotations: annotations,
    legend: {
      bgcolor: '#f8f9fc', bordercolor: '#e0e3eb', borderwidth: 1,
      font: { size: 10, color: '#131722' }, x: 0, y: 1, xanchor: 'left', yanchor: 'top',
    },
    xaxis: {
      rangeslider: { visible: false },
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      type: 'category', categoryarray: categoryArray, categoryorder: 'array',
      tickvals: tickVals, ticktext: tickText, tickangle: 0,
      zeroline: false, linecolor: '#ccc',
    },
    yaxis: {
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      side: 'right', domain: [0.46, 1.0],
      zeroline: false, linecolor: '#ccc',
    },
    yaxis2: {
      showgrid: false, side: 'right', domain: [0.27, 0.40],
      zeroline: false,
    },
    yaxis3: {
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      side: 'right', domain: [0, 0.21], range: [0, 100],
      tickvals: [30, 70], zeroline: false,
    },
  };

  Plotly.react('chart', traces, layout, { responsive: true, displayModeBar: false });
}

if (FIRST_TF) showChart(FIRST_TF);
</script>
</body>
</html>
