// Generate phantom "future" category labels (no candles yet) so SMC labels

function genFutureDates(dates, n) {
  if (dates.length < 2) return [];
  const hasTime = dates[0].length > 10;
  const parse = s => hasTime
    ? new Date(s.replace(' ', 'T') + ':00Z')
    : new Date(s + 'T00:00:00Z');
  const pad = v => String(v).padStart(2, '0');
  const fmt = dt => {
    const y = dt.getUTCFullYear(), mo = pad(dt.getUTCMonth() + 1), da = pad(dt.getUTCDate());
    if (!hasTime) return `${y}-${mo}-${da}`;
    return `${y}-${mo}-${da} ${pad(dt.getUTCHours())}:${pad(dt.getUTCMinutes())}`;
  };
  const last = parse(dates[dates.length - 1]);
  const prev = parse(dates[dates.length - 2]);
  const step = last.getTime() - prev.getTime();
  if (!(step > 0)) return [];
  const out = [];
  for (let i = 1; i <= n; i++) out.push(fmt(new Date(last.getTime() + step * i)));
  return out;
}

      xanchor:'left', yanchor:'middle', bgcolor:'rgba(255,255,255,0.7)',
    });
  });

  (s.bull_fvgs || []).forEach(fvg => {
    shapes.push({
      type:'rect', x0:fvg.x0, x1:fvg.x1, y0:fvg.bottom, y1:fvg.top,
      xref:'x', yref:'y',
      fillcolor:'rgba(0,188,212,0.10)',
      line:{color:'rgba(0,188,212,0.45)', width:1, dash:'dot'},
    });
  });

  (s.bear_fvgs || []).forEach(fvg => {
    shapes.push({
      type:'rect', x0:fvg.x0, x1:fvg.x1, y0:fvg.bottom, y1:fvg.top,
      xref:'x', yref:'y',
      fillcolor:'rgba(255,152,0,0.10)',
      line:{color:'rgba(255,152,0,0.45)', width:1, dash:'dot'},
    });
  });

  (s.bos || []).slice(-5).forEach(b => {
    const col = b.dir === 1 ? '#26a69a' : '#ef5350';
    shapes.push({
      type:'line', x0:b.date, x1:lastDate, y0:b.level, y1:b.level,
      xref:'x', yref:'y',
      line:{color:col, width:1.5, dash:'dash'},
    });
    annotations.push({
      x:labelX, y:b.level, xref:'x', yref:'y',
      text:(b.dir===1?'BOS ↑':'BOS ↓') + ' ' + b.level.toFixed(0),
      showarrow:false, font:{color:col, size:9},
      xanchor:'left', yanchor:'bottom', bgcolor:'rgba(255,255,255,0.85)',
    });
  });

  (s.choch || []).slice(-5).forEach(c => {
    const col = c.dir === 1 ? '#80cbc4' : '#ef9a9a';
    shapes.push({
      type:'line', x0:c.date, x1:lastDate, y0:c.level, y1:c.level,
      xref:'x', yref:'y',
      line:{color:col, width:1, dash:'dot'},
    });
    annotations.push({
      x:labelX, y:c.level, xref:'x', yref:'y',
      text:(c.dir===1?'CHoCH ↑':'CHoCH ↓') + ' ' + c.level.toFixed(0),
      showarrow:false, font:{color:col, size:9},
      xanchor:'left', yanchor:'top', bgcolor:'rgba(255,255,255,0.85)',
    });
  });

  (s.buy_liq || []).filter(l=>l.open).slice(-3).forEach(l => {
    shapes.push({
      type:'line', x0:d.dates[0], x1:lastDate, y0:l.level, y1:l.level,
      xref:'x', yref:'y',
      line:{color:'rgba(38,166,154,0.55)', width:1, dash:'dashdot'},
    });
    annotations.push({
      x:labelX, y:l.level, xref:'x', yref:'y',
      text:'BSL ' + l.level.toFixed(0), showarrow:false,
      font:{color:'rgba(38,166,154,0.8)', size:9},
      xanchor:'left', yanchor:'top', bgcolor:'rgba(255,255,255,0.85)',
    });
  });

  (s.sell_liq || []).filter(l=>l.open).slice(-3).forEach(l => {
    shapes.push({
      type:'line', x0:d.dates[0], x1:lastDate, y0:l.level, y1:l.level,
      xref:'x', yref:'y',
      line:{color:'rgba(239,83,80,0.55)', width:1, dash:'dashdot'},
    });
    annotations.push({
      x:labelX, y:l.level, xref:'x', yref:'y',
      text:'SSL ' + l.level.toFixed(0), showarrow:false,
      font:{color:'rgba(239,83,80,0.8)', size:9},
      xanchor:'left', yanchor:'bottom', bgcolor:'rgba(255,255,255,0.85)',
    });
  });
  } // end _mode === 'smc'

  if (_mode === 'muster') {
  // ── TF Chart Patterns ────────────────────────────────────────────────
  (d.patterns || []).filter(p => p.sig).forEach(pat => {
    const isBull    = pat.dir === 1;
    const isNeutral = pat.dir === 0;
    const col    = isNeutral ? '#7b68ee' : (isBull ? '#26a69a' : '#ef5350');
    const fill   = isNeutral ? 'rgba(123,104,238,0.07)' : (isBull ? 'rgba(38,166,154,0.09)' : 'rgba(239,83,80,0.09)');
    const border = isNeutral ? 'rgba(123,104,238,0.55)'  : (isBull ? 'rgba(38,166,154,0.6)' : 'rgba(239,83,80,0.6)');

    if (pat.render === 'lines') {
      // Channels, triangles, wedges, flags – two angled trendlines
      shapes.push({
        type:'rect', xref:'x', yref:'y',
        x0:pat.start_date, x1:pat.end_date,
        y0:pat.y0, y1:pat.y1,
        fillcolor:fill, line:{width:0},
      });
      shapes.push({
        type:'line', xref:'x', yref:'y',
        x0:pat.upper_x0, x1:pat.upper_x1,
        y0:pat.upper_y0, y1:pat.upper_y1,
        line:{color:border, width:2},
      });
      shapes.push({
        type:'line', xref:'x', yref:'y',
        x0:pat.lower_x0, x1:pat.lower_x1,
        y0:pat.lower_y0, y1:pat.lower_y1,
        line:{color:border, width:2},
      });
      annotations.push({
        x:pat.end_date, y:pat.level, xref:'x', yref:'y',
        text:'<b>' + pat.label + '</b>', showarrow:false,
        font:{color:col, size:10},
        xanchor:'right', yanchor:'middle',
        bgcolor:'rgba(255,255,255,0.88)', borderpad:3,
      });
    } else if (pat.render === 'candle') {
      // Candlestick / indicator patterns – arrow annotation
      annotations.push({
        x:pat.start_date, y:pat.level, xref:'x', yref:'y',
        text:'<b>' + (isBull ? '▲ ' : '▼ ') + pat.label + '</b>',
        showarrow:true, arrowhead:2, arrowcolor:col, arrowsize:0.8, arrowwidth:1.5,
        ax:0, ay:isBull ? 32 : -32,
        font:{color:col, size:9},
        bgcolor:'rgba(255,255,255,0.92)', borderpad:2,
        bordercolor:col, borderwidth:1,
      });
    } else {
      // Box-based: Double Top/Bottom, H&S – rectangle + horizontal neckline
      shapes.push({
        type:'rect', xref:'x', yref:'y',
        x0:pat.start_date, x1:pat.end_date,
        y0:pat.y0, y1:pat.y1,
        fillcolor:fill, line:{color:border, width:1.5, dash:'dot'},
      });
      shapes.push({
        type:'line', xref:'x', yref:'y',
        x0:pat.start_date, x1:labelX,
        y0:pat.level, y1:pat.level,
        line:{color:col, width:1.8, dash:'dash'},
      });
      annotations.push({
        x:labelX, y:pat.level, xref:'x', yref:'y',
        text:'<b>' + pat.label + '</b>', showarrow:false,
        font:{color:col, size:10},
        xanchor:'left', yanchor:isBull ? 'bottom' : 'top',
        bgcolor:'rgba(255,255,255,0.88)', borderpad:3,
      });
    }
  });
  } // end _mode === 'muster'

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const tickVals = [], tickText = [];
  if (isIntraday) {
    const seenDays = new Set();
    d.dates.forEach(dt => {
      const day = dt.substring(0, 10);
      if (!seenDays.has(day)) {
        seenDays.add(day);
        const p = day.split('-');
        tickVals.push(dt); tickText.push(p[2] + '.' + p[1] + '.');
      }
    });
  } else {
    const seenMonths = new Set();
    d.dates.forEach(dt => {
      const key = dt.substring(0, 7);
      if (!seenMonths.has(key)) {
        seenMonths.add(key);
        const m = parseInt(dt.substring(5, 7)) - 1;
        tickVals.push(dt); tickText.push(MONTHS[m]);
      }
    });
  }

  const layout = {
    paper_bgcolor: '#ffffff', plot_bgcolor: '#ffffff',
    font: { color: '#131722', size: 11 },
    margin: { l: 8, r: 80, t: 8, b: 28 },
    shapes: shapes,
    annotations: annotations,
    legend: {
      bgcolor: '#f8f9fc', bordercolor: '#e0e3eb', borderwidth: 1,
      font: { size: 10, color: '#131722' }, x: 0, y: 1, xanchor: 'left', yanchor: 'top',
    },
    xaxis: {
      rangeslider: { visible: false },
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      type: 'category', categoryarray: categoryArray, categoryorder: 'array',
      tickvals: tickVals, ticktext: tickText, tickangle: 0,
      zeroline: false, linecolor: '#ccc',
    },
    yaxis: {
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      side: 'right', domain: [0.46, 1.0],
      zeroline: false, linecolor: '#ccc',
    },
    yaxis2: {
      showgrid: false, side: 'right', domain: [0.27, 0.40],
      zeroline: false,
    },
    yaxis3: {
      showgrid: true, gridcolor: '#e0e3eb', gridwidth: 1,
      side: 'right', domain: [0, 0.21], range: [0, 100],
      tickvals: [30, 70], zeroline: false,
    },
  };

  Plotly.react('chart', traces, layout, { responsive: true, displayModeBar: false });
}

if (FIRST_TF) showChart(FIRST_TF);
</script>
</body>
</html>
