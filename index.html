<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screening Reports</title>
  <style>
    :root{--bg:#ffffff;--panel:#f8f9fa;--text:#131722;--muted:#6b7280;--line:#e5e7eb;--accent:#2962ff;--soft:#eff6ff;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;font-family:"Segoe UI","Noto Sans",sans-serif;font-size:13px;background:var(--bg);color:var(--text);}
    body{display:flex;}
    .nav{width:190px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);padding:12px 8px;overflow-y:auto;height:100vh;}
    .nav h2{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:0 0 8px 4px;}
    .top-link{display:block;font-size:12px;font-weight:500;color:var(--text);text-decoration:none;padding:6px 8px;border-radius:4px;}
    .top-link:hover,.top-link.active{background:var(--soft);color:var(--accent);}
    .acc-hdr{display:flex;justify-content:space-between;align-items:center;width:100%;background:none;border:none;font-size:12px;font-weight:500;color:var(--text);padding:6px 8px;border-radius:4px;cursor:pointer;margin-top:2px;}
    .acc-hdr:hover,.acc-hdr.open{color:var(--accent);background:var(--soft);}
    .acc-icon{font-size:9px;margin-left:4px;transition:transform .2s;}
    .acc-hdr.open .acc-icon{transform:rotate(180deg);}
    .acc-body{overflow:hidden;max-height:0;transition:max-height .25s;}
    .acc-body a{display:block;font-size:11px;color:#374151;text-decoration:none;padding:4px 8px 4px 18px;border-radius:3px;}
    .acc-body a:hover,.acc-body a.active{background:var(--soft);color:var(--accent);}
    .frame{flex:1;border:none;height:100vh;min-width:0;}
  </style>
</head>
<body>
  <nav class="nav">
    <h2>Navigation</h2>
    <a class="top-link" href="/pre-market/" target="content">Market Prep</a>
    <button class="acc-hdr" onclick="toggleAcc(this)"><span>Screening</span><span class="acc-icon">&#9660;</span></button>
    <div class="acc-body"><a href="/screening/ema200-long-bounce.html" target="content">Ema200 Long Bounce</a>
<a href="/screening/false-breakout-long.html" target="content">False Breakout Long</a>
<a href="/screening/gold-chart.html" target="content">Gold Chart</a>
<a href="/screening/gold.html" target="content">Gold</a>
<a href="/screening/news-false-breakout-ema200.html" target="content">News False Breakout Ema200</a>
<a href="/screening/news-tv.html" target="content">News Tv</a>
<a href="/screening/recent-news-tv.html" target="content">Recent News Tv</a>
<a href="/screening/us-stock-momentum-nasdaq-100.html" target="content">Us Stock Momentum Nasdaq 100</a>
<a href="/screening/us-stock-momentum-sp500.html" target="content">Us Stock Momentum Sp500</a>
<a href="/screening/us-stock-momentum.html" target="content">Us Stock Momentum</a></div>
  </nav>
  <iframe name="content" class="frame" src="/pre-market/" onload="updateActive(this)"></iframe>
  <script>
    function toggleAcc(btn){
      var body=btn.nextElementSibling;
      var open=btn.classList.toggle('open');
      body.style.maxHeight=open?body.scrollHeight+'px':'0';
    }
    document.querySelectorAll('.acc-hdr').forEach(function(btn){
      btn.classList.add('open');
      btn.nextElementSibling.style.maxHeight=btn.nextElementSibling.scrollHeight+'px';
    });
    function updateActive(frame){
      try{
        var path=frame.contentWindow.location.pathname;
        document.querySelectorAll('a[target="content"]').forEach(function(a){
          a.classList.remove('active');
          var href=a.getAttribute('href');
          if(path===href||path.startsWith(href.replace(/[/]$/,'')+'/'))a.classList.add('active');
        });
      }catch(e){}
    }
  </script>
</body>
</html>
