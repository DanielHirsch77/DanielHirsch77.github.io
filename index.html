<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Willkommen</title>
  <style>
    :root { --bg1:#0f172a; --bg2:#1e293b; --card:#ffffff; --text:#0f172a; --muted:#475569; --accent:#0ea5e9; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      background: radial-gradient(1200px 800px at 10% 10%, #38bdf8 0%, transparent 40%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: min(740px, 100%);
      background: var(--card);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(2, 6, 23, 0.35);
    }
    h1 { margin: 0 0 12px; font-size: clamp(28px, 4vw, 42px); }
    p { margin: 0 0 14px; line-height: 1.6; color: var(--muted); }
    a {
      display: inline-block;
      margin-top: 8px;
      text-decoration: none;
      background: var(--accent);
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Deine GitHub Seite ist live</h1>
    <p>Diese Seite wurde automatisch eingerichtet und ueber GitHub Pages veroeffentlicht.</p>
    <p>Du kannst die index.html jederzeit aendern und erneut nach main pushen.</p>
    <a href="https://github.com/">Zu GitHub</a>
  </main>
</body>
</html>
