const S="//@version=6\n// =============================================================================\n//  GOLD MACRO NARRATIVE EVENTS  \u00b7  CPI / PCE / NFP / FOMC / PPI\n// -----------------------------------------------------------------------------\n//  Zeichnet wichtige US-Makro-Termine als senkrechte Linie + Infotext-Block\n//  direkt in den Gold-Chart (XAU/USD). Zeiten werden in deutscher Zeit\n//  (MEZ/MESZ) angezeigt.\n//\n//  WICHTIG \u2013 manuelle Pflege:\n//  Pine Script kann KEINE Live-Daten / keinen Wirtschaftskalender abrufen.\n//  Du tr\u00e4gst die Termine unten in der Tabelle \"EVENTS\" selbst ein.\n//  Format pro Zeile:  addEvent(JAHR, MONAT, TAG, STUNDE_ET, MINUTE_ET, \"TYP\", \"INFOTEXT\")\n//  -> Stunde/Minute in US-Ostk\u00fcstenzeit (ET) eintragen, da die US-Daten so\n//     terminiert sind (CPI/NFP/PPI meist 08:30 ET, FOMC meist 14:00 ET).\n//     Das Script rechnet selbst nach deutscher Zeit um und zeigt sie an.\n// =============================================================================\n\nindicator(\"Gold Macro Narrative Events\", overlay = true, max_lines_count = 500, max_labels_count = 500, max_boxes_count = 500)\n\n// ----------------------------- EINSTELLUNGEN --------------------------------\ngrpFilter = \"Event-Typen anzeigen\"\nshowCPI   = input.bool(true,  \"CPI  (Verbraucherpreise / Inflation)\", group = grpFilter)\nshowPCE   = input.bool(true,  \"PCE  (Fed-bevorzugtes Inflationsma\u00df)\", group = grpFilter)\nshowNFP   = input.bool(true,  \"NFP  (Arbeitsmarktbericht)\",           group = grpFilter)\nshowFOMC  = input.bool(true,  \"FOMC (Zinsentscheidung)\",              group = grpFilter)\nshowPPI   = input.bool(true,  \"PPI  (Erzeugerpreise)\",                group = grpFilter)\n\ngrpStyle  = \"Darstellung\"\nlineWidth    = input.int(1, \"Linienbreite\", minval = 1, maxval = 4, group = grpStyle)\nlineTrans    = input.int(60, \"Linien-Transparenz (0=voll, 90=fast unsichtbar)\", minval = 0, maxval = 90, group = grpStyle)\nlineStyleSel = input.string(\"Gestrichelt\", \"Linienstil\", options = [\"Durchgezogen\", \"Gestrichelt\", \"Gepunktet\"], group = grpStyle)\nlabelSize    = input.string(\"Klein\", \"Textgr\u00f6\u00dfe\", options = [\"Klein\", \"Normal\", \"Gro\u00df\"], group = grpStyle)\nlabelOffset  = input.float(2.0, \"Label-Abstand von Kerzen (ATR-Faktor)\", minval = 0.5, maxval = 10.0, step = 0.5, group = grpStyle)\nshowCountdownTbl = input.bool(true, \"Tabelle: n\u00e4chstes Event oben rechts\", group = grpStyle)\nmaxFutureDays    = input.int(120, \"Nur Events der letzten/n\u00e4chsten X Tage\", minval = 7, maxval = 720, group = grpStyle)\n\ngrpColor = \"Farben\"\ncolCPI   = input.color(color.new(#e74c3c, 0), \"CPI\",  group = grpColor, inline = \"c1\")\ncolPCE   = input.color(color.new(#e67e22, 0), \"PCE\",  group = grpColor, inline = \"c1\")\ncolNFP   = input.color(color.new(#3498db, 0), \"NFP\",  group = grpColor, inline = \"c2\")\ncolFOMC  = input.color(color.new(#9b59b6, 0), \"FOMC\", group = grpColor, inline = \"c2\")\ncolPPI   = input.color(color.new(#16a085, 0), \"PPI\",  group = grpColor, inline = \"c3\")\n\n// --------------------------- HILFSFUNKTIONEN --------------------------------\n// Liniendarstellung\nf_lineStyle() =>\n    lineStyleSel == \"Durchgezogen\" ? line.style_solid : lineStyleSel == \"Gepunktet\" ? line.style_dotted : line.style_dashed\n\nf_labelSize() =>\n    labelSize == \"Normal\" ? size.normal : labelSize == \"Gro\u00df\" ? size.large : size.small\n\n// Event-Typ -> Farbe\nf_color(string t) =>\n    t == \"CPI\"  ? colCPI  :\n     t == \"PCE\"  ? colPCE  :\n     t == \"NFP\"  ? colNFP  :\n     t == \"FOMC\" ? colFOMC :\n     t == \"PPI\"  ? colPPI  : color.gray\n\n// Event-Typ -> ist eingeschaltet?\nf_enabled(string t) =>\n    t == \"CPI\"  ? showCPI  :\n     t == \"PCE\"  ? showPCE  :\n     t == \"NFP\"  ? showNFP  :\n     t == \"FOMC\" ? showFOMC :\n     t == \"PPI\"  ? showPPI  : false\n\n// ET -> deutsche Zeit (MEZ/MESZ) als lesbarer String \"HH:MM\"\n// Wir lassen Pine die Zeitzonen-Umrechnung machen, indem wir den UTC-Zeitstempel\n// des Events bilden und ihn in \"Europe/Berlin\" formatieren.\n// Da US-DST und EU-DST nicht exakt gleich schalten, ist die ET->UTC-Offsetwahl\n// approximativ \u00fcber den Monat gel\u00f6st (ET = UTC-4 in Sommerzeit, UTC-5 Winter).\nf_etToUtcMillis(int y, int mo, int d, int hET, int mnET) =>\n    // grobe US-DST-Regel: DST aktiv ca. M\u00e4rz..November\n    bool usDst = mo > 3 and mo < 11\n    int offset = usDst ? 4 : 5            // Stunden, die man zu ET addiert, um UTC zu bekommen\n    timestamp(\"GMT+0\", y, mo, d, hET + offset, mnET)\n\n// formatiert einen UTC-Millis-Zeitstempel als deutsche Ortszeit\nf_fmtBerlin(int ms) =>\n    str.format_time(ms, \"dd.MM.yyyy  HH:mm\", \"Europe/Berlin\")\n\n// ------------------------------ EVENT-SPEICHER ------------------------------\n// Wir sammeln Events in Arrays. addEvent() f\u00fcllt sie.\nvar int[]    evTime  = array.new_int()      // UTC-Millis des Events\nvar string[] evType  = array.new_string()   // \"CPI\" etc.\nvar string[] evInfo  = array.new_string()   // Freitext\n\naddEvent(int y, int mo, int d, int hET, int mnET, string t, string info) =>\n    int ms = f_etToUtcMillis(y, mo, d, hET, mnET)\n    array.push(evTime, ms)\n    array.push(evType, t)\n    array.push(evInfo, info)\n\n// =============================================================================\n//  EVENTS  \u00b7  HIER PFLEGEN\n//  Stunde/Minute in ET. Typische Zeiten: CPI/PPI/NFP = 8:30 ET, FOMC = 14:00 ET,\n//  PCE = 8:30 ET. Passe Werte/Texte nach Ver\u00f6ffentlichung an.\n//  (Beispiel-Termine 2025/2026 \u2013 bitte gegen offiziellen Kalender pr\u00fcfen!)\n// =============================================================================\nif barstate.isfirst\n    // ---- 2024 ----\n    addEvent(2024, 1,  11, 8,  30, \"CPI\",  \"US CPI Dezember 2023\")\n    addEvent(2024, 1,  12, 8,  30, \"PPI\",  \"US PPI Dezember 2023\")\n    addEvent(2024, 1, ems\n                    bestIdx := i\n    [bestMs, bestIdx]\n\nif showCountdownTbl and barstate.islast\n    [nextMs, nextIdx] = f_findNext()\n    if not na(nextIdx)\n        string nt   = array.get(evType, nextIdx)\n        string ninf = array.get(evInfo, nextIdx)\n        // Countdown\n        int diffMs  = nextMs - nowMs\n        int days    = math.floor(diffMs / 86400000)\n        int hours   = math.floor((diffMs % 86400000) / 3600000)\n        int mins    = math.floor((diffMs % 3600000) / 60000)\n        string head = \"\u23f1 N\u00c4CHSTES: \" + nt\n        string body = f_fmtBerlin(nextMs) + \" MEZ/MESZ\\n\" + \"in \" + str.tostring(days) + \"d \" + str.tostring(hours) + \"h \" + str.tostring(mins) + \"m\\n\" + ninf\n        table.cell(tbl, 0, 0, head, text_color = color.white, bgcolor = f_color(nt), text_size = size.normal, text_halign = text.align_left)\n        table.cell(tbl, 0, 1, body, text_color = color.white, bgcolor = color.new(color.black, 20), text_size = size.small, text_halign = text.align_left)\n\n// =============================================================================\n//  ALERTS \u2013 optional: Alert kurz vor jedem aktiven Event\n// =============================================================================\nalertcondition(true, title = \"Macro-Event Hinweis\", message = \"Gold Macro Event n\u00e4hert sich \u2013 siehe Chart\")\n";
