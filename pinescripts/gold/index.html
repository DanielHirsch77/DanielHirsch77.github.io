<style>
  :root{--bg:#131722;--panel:#1e222d;--border:#2a2e39;--text:#d1d4dc;--muted:#787b86;--accent:#2962ff;--green:#26a69a;}

  .steps b{color:var(--text);}
  pre{margin:20px 24px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;overflow-x:auto;font-family:"Consolas","Courier New",monospace;font-size:11.5px;line-height:1.6;white-space:pre;}

    setTimeout(function(){o.style.display='none';document.getElementById('btnCopy').style.display='inline-block';},3000);
