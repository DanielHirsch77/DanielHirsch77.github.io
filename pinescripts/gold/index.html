<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gold Narrative - PineScript</title>
<style>
  :root{--bg:#131722;--panel:#1e222d;--border:#2a2e39;--text:#d1d4dc;--muted:#787b86;--accent:#2962ff;--green:#26a69a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .bar{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .bar-title{font-size:16px;font-weight:700;}
  .bar-sub{font-size:12px;color:var(--muted);}
  .btn{padding:10px 24px;border-radius:6px;border:none;cursor:pointer;font-size:15px;font-weight:700;}
  .btn-copy{background:var(--accent);color:#fff;}
  .btn-copy:hover{background:#1a4fc0;}
  .btn-ok{background:var(--green);color:#fff;display:none;}
  .steps{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
  .step{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;}
  .step b{display:block;color:var(--muted);font-size:10px;margin-bottom:2px;text-transform:uppercase;}
  pre{margin:20px 24px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;overflow-x:auto;font-family:"Consolas","Courier New",monospace;font-size:11.5px;line-height:1.6;white-space:pre;}
</style>
</head>
<body>
<div class="bar">
  <span class="bar-title">Gold Narrative - PineScript v5</span>
  <span class="bar-sub">CPI · PCE · FOMC · PPI · NFP · 2024-2026</span>
  <button class="btn btn-copy" id="btnCopy" onclick="doCopy()">Kopieren</button>
  <button class="btn btn-ok" id="btnOk">Kopiert!</button>
</div>
<div class="steps">
  <div class="step"><b>1</b>Kopieren klicken</div>
  <div class="step"><b>2</b>Pine Script Editor in TradingView</div>
  <div class="step"><b>3</b>Strg+A &rarr; Strg+V</div>
  <div class="step"><b>4</b>Speichern &rarr; Zum Chart</div>
</div>
<pre id="code"></pre>
<script>
const S="// This source code is subject to the terms of the Mozilla Public License 2.0\n// @version=5\nindicator(\"Gold Macro Events\", overlay=true, shorttitle=\"GoldNarr\",\n     max_lines_count=300, max_labels_count=300)\n\n// ---- Inputs ----------------------------------------------------------------\nshow_cpi  = input.bool(true,  \"CPI  8:30 ET\",  group=\"Events\")\nshow_pce  = input.bool(true,  \"PCE  8:30 ET\",  group=\"Events\")\nshow_fomc = input.bool(true,  \"FOMC 14:00 ET\", group=\"Events\")\nshow_ppi  = input.bool(false, \"PPI  8:30 ET\",  group=\"Events\")\nshow_nfp  = input.bool(false, \"NFP  8:30 ET\",  group=\"Events\")\nltr     = input.int(60, \"Linie Transparenz\", minval=0, maxval=95, group=\"Stil\")\nbgt     = input.int(88, \"Hintergrund Transparenz\", minval=70, maxval=97, group=\"Stil\")\nshow_bg = input.bool(true, \"Hintergrundfarbe\", group=\"Stil\")\nc_cpi   = input.color(#ff9800, \"CPI\",  group=\"Farben\")\nc_pce   = input.color(#2196f3, \"PCE\",  group=\"Farben\")\nc_fomc  = input.color(#ef5350, \"FOMC\", group=\"Farben\")\nc_ppi   = input.color(#9c27b0, \"PPI\",  group=\"Farben\")\nc_nfp   = input.color(#26a69a, \"NFP\",  group=\"Farben\")\n\n// ---- Draw ------------------------------------------------------------------\nf_draw(col, txt) =>\n    line.new(bar_index, 0.01, bar_index, 99999.0,\n         xloc=xloc.bar_index, color=color.new(col, ltr), width=1)\n    label.new(bar_index, 0,\n         text=txt, xloc=xloc.bar_index, yloc=yloc.abovebar,\n         color=color.new(col, 72), textcolor=color.white,\n         style=label.style_label_down, size=size.small)\n\n// ---- Dates -----------------------------------------------------------------\nd = dayofmonth(time)\nm = month(time)\ny = year(time)\n\n// CPI\ncpi_a = (y==2024 and m==1  and d==11) or (y==2024 and m==2  and d==13) or (y==2024 and m==3  and d==12)\ncpi_b = (y==2024 and m==4  and d==10) or (y==2024 and m==5  and d==15) or (y==2024 and m==6  and d==12)\ncpi_c = (y==2024 and m==7  and d==11) or (y==2024 and m==8  and d==14) or (y==2024 and m==9  and d==11)\ncpi_d = (y==2024 and m==10 and d==10) or (y==2024 and m==11 and d==13) or (y==2024 and m==12 and d==11)\ncpi_e = (y==2025 and m==1  and d==15) or (y==2025 and m==2  and d==12) or (y==2025 and m==3  and d==12)\ncpi_f = (y==2025 and m==4  and d==10) or (y==2025 and m==5  and d==13) or (y==2025 and m==6  and d==11)\ncpi_g = (y==2025 and m==7  and d==15) or (y==2025 and m==8  and d==12) or (y==2025 and m==9  and d==10)\ncpi_h = (y==2025 and m==10 and d==15) or (y==2025 and m==11 and d==12) or (y==2025 and m==12 and d==10)\ncpi_i = (y==2026 and m==1  and d==14) or (y==2026 and m==2  and d==11) or (y==2026 and m==3  and d==11)\ncpi_j = (y==2026 and m==4  and d==10) or (y==2026 and m==5  and d==13) or (y==2026 and m==6  and d==10)\ncpi_k = (y==2026 and m==7  and d==15) or (y==2026 and m==8  and d==12) or (y==2026 and m==9  and d==9)\ncpi_l = (y==2026 and m==10 and d==14) or (y==2026 and m==11 and d==12) or (y==2026 and m==12 and d==9)\nis_cpi = cpi_a or cpi_b or cpi_c or cpi_d or cpi_e or cpi_f or cpi_g or cpi_h or cpi_i or cpi_j or cpi_k or cpi_l\n\n// PCE\npce_a = (y==2024 and m==2  and d==29) or (y==2024 and m==3  and d==29) or (y==2024 and m==4  and d==26)\npce_b = (y==2024 and m==5  and d==31) or (y==2024 and m==6  and d==28) or (y==2024 and m==7  and d==26)\npce_c = (y==2024 and m==8  and d==30) or (y==2024 and m==9  and d==27) or (y==2024 and m==10 and d==31)\npce_d = (y==2024 and m==11 and d==27) or (y==2024 and m==12 and d==20)\npce_e = (y==2025 and m==1  and d==31) or (y==2025 and m==2  and d==28) or (y==2025 and m==3  and d==28)\npce_f = (y==2025 and m==4  and d==30) or (y==2025 and m==5  and d==30) or (y==2025 and m==6  and d==27)\npce_g = (y==2025 and m==7  and d==31) or (y==2025 and m==8  and d==29) or (y==2025 and m==9  and d==26)\npce_h = (y==2025 and m==10 and d==31) or (y==2025 and m==11 and d==26) or (y==2025 and m==12 and d==19)\npce_i = (y==2026 and m==1  and d==30) or (y==2026 and m==2  and d==27) or (y==2026 and m==3  and d==27)\npce_j = (y==2026 and m==4  and d==30) or (y==2026 and m==5  and d==29) or (y==2026 and m==6  and d==26)\nis_pce = pce_a or pce_b or pce_c or pce_d or pce_e or pce_f or pce_g or pce_h or pce_i or pce_j\n\n// FOMC\nfomc_a = (y==2024 and m==1  and d==31) or (y==2024 and m==3  and d==20) or (y==2024 and m==5  and d==1)\nfomc_b = (y==2024 and m==6  and d==12) or (y==2024 and m==7  and d==31) or (y==2024 and m==9  and d==18)\nfomc_c = (y==2024 and m==11 and d==7)  or (y==2024 and m==12 and d==18)\nfomc_d = (y==2025 and m==1  and d==29) or (y==2025 and m==3  and d==19) or (y==2025 and m==5  and d==7)\nfomc_e = (y==2025 and m==6  and d==18) or (y==2025 and m==7  and d==30) or (y==2025 and m==9  and d==17)\nfomc_f = (y==2025 and m==10 and d==29) or (y==2025 and m==12 and d==10)\nfomc_g = (y==2026 and m==1  and d==28) or (y==2026 and m==3  and d==18) or (y==2026 and m==5  and d==6)\nfomc_h = (y==2026 and m==6  and d==17) or (y==2026 and m==7  and d==29) or (y==2026 and m==9  and d==16)\nfomc_i = (y==2026 and m==10 and d==28) or (y==2026 and m==12 and d==9)\nis_fomc = fomc_a or fomc_b or fomc_c or fomc_d or fomc_e or fomc_f or fomc_g or fomc_h or fomc_i\n\n// PPI\nppi_a = (y==2024 and m==1  and d==12) or (y==2024 and m==2  and d==16) or (y==2024 and m==3  and d==14)\nppi_b = (y==2024 and m==4  and d==11) or (y==2024 and m==5  and d==14) or (y==2024 and m==6  and d==13)\nppi_c = (y==2024 and m==7  and d==12) or (y==2024 and m==8  and d==13) or (y==2024 and m==9  and d==12)\nppi_d = (y==2024 and m==10 and d==11) or (y==2024 and m==11 and d==14) or (y==2024 and m==12 and d==12)\nppi_e = (y==2025 and m==1  and d==14) or (y==2025 and m==2  and d==13) or (y==2025 and m==3  and d==13)\nppi_f = (y==2025 and m==4  and d==11) or (y==2025 and m==5  and d==15) or (y==2025 and m==6  and d==12)\nppi_g = (y==2025 and m==7  and d==15) or (y==2025 and m==8  and d==14) or (y==2025 and m==9  and d==11)\nppi_h = (y==2025 and m==10 and d==14) or (y==2025 and m==11 and d==13) or (y==2025 and m==12 and d==11)\nppi_i = (y==2026 and m==1  and d==15) or (y==2026 and m==2  and d==12) or (y==2026 and m==3  and d==12)\nppi_j = (y==2026 and m==4  and d==9)  or (y==2026 and m==5  and d==14) or (y==2026 and m==6  and d==11)\nis_ppi = ppi_a or ppi_b or ppi_c or ppi_d or ppi_e or ppi_f or ppi_g or ppi_h or ppi_i or ppi_j\n\n// NFP\nnfp_a = (y==2024 and m==1  and d==5)  or (y==2024 and m==2  and d==2)  or (y==2024 and m==3  and d==8)\nnfp_b = (y==2024 and m==4  and d==5)  or (y==2024 and m==5  and d==3)  or (y==2024 and m==6  and d==7)\nnfp_c = (y==2024 and m==7  and d==5)  or (y==2024 and m==8  and d==2)  or (y==2024 and m==9  and d==6)\nnfp_d = (y==2024 and m==10 and d==4)  or (y==2024 and m==11 and d==1)  or (y==2024 and m==12 and d==6)\nnfp_e = (y==2025 and m==1  and d==10) or (y==2025 and m==2  and d==7)  or (y==2025 and m==3  and d==7)\nnfp_f = (y==2025 and m==4  and d==4)  or (y==2025 and m==5  and d==2)  or (y==2025 and m==6  and d==6)\nnfp_g = (y==2025 and m==7  and d==3)  or (y==2025 and m==8  and d==1)  or (y==2025 and m==9  and d==5)\nnfp_h = (y==2025 and m==10 and d==3)  or (y==2025 and m==11 and d==7)  or (y==2025 and m==12 and d==5)\nnfp_i = (y==2026 and m==1  and d==9)  or (y==2026 and m==2  and d==6)  or (y==2026 and m==3  and d==6)\nnfp_j = (y==2026 and m==4  and d==3)  or (y==2026 and m==5  and d==8)  or (y==2026 and m==6  and d==5)\nis_nfp = nfp_a or nfp_b or nfp_c or nfp_d or nfp_e or nfp_f or nfp_g or nfp_h or nfp_i or nfp_j\n\n// ---- Background ------------------------------------------------------------\nvar color bg_col = na\nbg_col := na\nif show_bg and show_cpi  and is_cpi\n    bg_col := color.new(c_cpi,  bgt)\nif show_bg and show_pce  and is_pce\n    bg_col := color.new(c_pce,  bgt)\nif show_bg and show_fomc and is_fomc\n    bg_col := color.new(c_fomc, bgt)\nif show_bg and show_ppi  and is_ppi\n    bg_col := color.new(c_ppi,  bgt)\nif show_bg and show_nfp  and is_nfp\n    bg_col := color.new(c_nfp,  bgt)\nbgcolor(bg_col)\n\n// ---- Lines and labels ------------------------------------------------------\nif barstate.isconfirmed\n    if show_cpi  and is_cpi\n        f_draw(c_cpi,  \"CPI\\n8:30 ET\")\n    if show_pce  and is_pce\n        f_draw(c_pce,  \"PCE\\n8:30 ET\")\n    if show_fomc and is_fomc\n        f_draw(c_fomc, \"FOMC\\n14:00 ET\")\n    if show_ppi  and is_ppi\n        f_draw(c_ppi,  \"PPI\\n8:30 ET\")\n    if show_nfp  and is_nfp\n        f_draw(c_nfp,  \"NFP\\n8:30 ET\")\n\n// ---- Alerts ----------------------------------------------------------------\nalertcondition(show_cpi  and is_cpi,  \"CPI\",  \"Gold: CPI 8:30 ET\")\nalertcondition(show_pce  and is_pce,  \"PCE\",  \"Gold: PCE 8:30 ET\")\nalertcondition(show_fomc and is_fomc, \"FOMC\", \"Gold: FOMC 14:00 ET\")\nalertcondition(show_ppi  and is_ppi,  \"PPI\",  \"Gold: PPI 8:30 ET\")\nalertcondition(show_nfp  and is_nfp,  \"NFP\",  \"Gold: NFP 8:30 ET\")\n";
document.getElementById('code').textContent=S;
function doCopy(){
  navigator.clipboard.writeText(S).then(function(){
    document.getElementById('btnCopy').style.display='none';
    var o=document.getElementById('btnOk');
    o.style.display='inline-block';
    setTimeout(function(){o.style.display='none';document.getElementById('btnCopy').style.display='inline-block';},3000);
  }).catch(function(){
    var t=document.createElement('textarea');
    t.value=S;t.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(t);t.select();document.execCommand('copy');
    document.body.removeChild(t);
    document.getElementById('btnCopy').textContent='Kopiert!';
  });
}
</script>
</body>
</html>
